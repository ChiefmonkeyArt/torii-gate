<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Torii Quest — Grass Jitter Lab (v0.2.317 candidate)</title>
<style>
  html, body { margin: 0; height: 100%; background: #0b1020; overflow: hidden; font-family: ui-monospace, "SF Mono", Menlo, monospace; color: #cfe8ff; }
  #app { width: 100vw; height: 100vh; display: block; }
  #hud {
    position: fixed; top: 12px; left: 12px; z-index: 10;
    font-size: 13px; line-height: 1.5;
    background: rgba(8,14,28,.72);
    padding: 12px 16px; border-radius: 10px; border: 1px solid rgba(120,180,255,.25);
    backdrop-filter: blur(6px); max-width: 380px;
  }
  #hud h1 { font-size: 14px; margin: 0 0 6px; color: #8be9a8; }
  #hud .row { display: flex; align-items: center; gap: 8px; margin: 4px 0; font-size: 12px; }
  #hud .row label { flex: 1; color: #7fb4ff; }
  #hud .row input[type="range"] { flex: 1.4; }
  #hud .row .val { width: 46px; text-align: right; color: #cfe8ff; font-variant-numeric: tabular-nums; }
  #hud .modeRow { margin: 8px 0; padding: 6px 8px; background: rgba(30,60,120,.4); border-radius: 6px; }
  #hud button {
    background: rgba(50,120,220,.4); color: #cfe8ff; border: 1px solid rgba(120,180,255,.4);
    padding: 4px 10px; border-radius: 4px; cursor: pointer; font: inherit; font-size: 12px;
  }
  #hud button.active { background: rgba(80,220,140,.55); border-color: rgba(140,255,180,.6); color: #04160a; font-weight: bold; }
  #hud .hint { color: #7fb4ff; font-size: 11px; margin-top: 6px; }
  #stamp { color: #7fb4ff; font-size: 11px; margin-top: 8px; opacity: .8; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "/node_modules/three/build/three.module.js",
    "three/addons/": "/node_modules/three/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="hud">
  <h1>Grass Jitter Lab — terra flat-ribbon shader</h1>
  <div class="modeRow">
    <div class="row" style="margin-bottom: 6px;">
      <button id="btnCurrent" class="active">CURRENT (v0.2.313)</button>
      <button id="btnFix">FIX (v0.2.317)</button>
    </div>
    <div class="hint">Press <b>1</b> = current · <b>2</b> = fix · <b>Space</b> = pause wind</div>
  </div>
  <div class="row"><label>windScrollX (÷)</label><input id="sx" type="range" min="5" max="120" step="1" value="25"/><span class="val" id="sxV">25</span></div>
  <div class="row"><label>windScrollZ (÷)</label><input id="sz" type="range" min="1" max="30" step="0.5" value="2"/><span class="val" id="szV">2.0</span></div>
  <div class="row"><label>windThreshold</label><input id="th" type="range" min="0" max="0.5" step="0.01" value="0.25"/><span class="val" id="thV">0.25</span></div>
  <div class="row"><label>windIntensity</label><input id="wi" type="range" min="0" max="1.2" step="0.02" value="0.30"/><span class="val" id="wiV">0.30</span></div>
  <div class="row"><label>curveFreq (rad/s)</label><input id="cf" type="range" min="0.2" max="8" step="0.1" value="4"/><span class="val" id="cfV">4.0</span></div>
  <div class="row"><label>noiseScale</label><input id="ns" type="range" min="0.005" max="0.10" step="0.001" value="0.025"/><span class="val" id="nsV">0.025</span></div>
  <div id="stamp"></div>
</div>
<canvas id="app"></canvas>
<script type="module" src="/grass-jitter-lab.js"></script>
</body>
</html>
