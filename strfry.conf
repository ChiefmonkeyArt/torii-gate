##
## strfry config — Torii Quest self-hosted relay
## Mounted read-only at /app/strfry.conf in the ghcr.io/hoytech/strfry image.
## Image layout: WORKDIR=/app, binary=/app/strfry, DB dir=/app/strfry-db/.
##

# Directory that contains the strfry LMDB database (restart required)
db = "./strfry-db/"

dbParams {
    maxreaders = 256
    mapsize = 10995116277760
    noReadAhead = false
}

events {
    maxEventSize = 65536
    rejectEventsNewerThanSeconds = 900
    rejectEventsOlderThanSeconds = 94608000
    rejectEphemeralEventsOlderThanSeconds = 60
    ephemeralEventsLifetimeSeconds = 300
    maxNumTags = 2000
    maxTagValSize = 1024
}

relay {
    # Listen on all interfaces so the Caddy container can reach us on the
    # docker network. Caddy is the only public entry point.
    bind = "0.0.0.0"

    port = 7777

    nofiles = 524288

    # Client real IP, as set by the Caddy reverse_proxy
    realIpHeader = "x-forwarded-for"

    auth {
        # NIP-42 auth disabled — open relay. Set enabled=true + serviceUrl to require auth.
        enabled = false
        serviceUrl = ""
    }

    info {
        name = "Torii Quest Relay"
        description = "Self-hosted nostr relay for Torii Quest"
        pubkey = ""
        self = ""
        contact = ""
        icon = ""
        banner = ""
        privacy = ""
        terms = ""
        nips = ""
    }

    maxWebsocketPayloadSize = 131072
    maxReqFilterSize = 200
    autoPingSeconds = 55
    enableTcpKeepalive = false
    queryTimesliceBudgetMicroseconds = 10000
    maxFilterLimit = 500
    maxTagsPerFilter = 3
    maxFilterLimitCount = 1000000
    maxSubsPerConnection = 200
    maxPendingOutboundBytes = 33554432

    writePolicy {
        plugin = ""
        timeoutSeconds = 10
    }

    compression {
        enabled = true
        slidingWindow = true
    }

    logging {
        dumpInAll = false
        dumpInEvents = false
        dumpInReqs = false
        dbScanPerf = false
        invalidEvents = true
    }

    numThreads {
        ingester = 3
        reqWorker = 3
        reqMonitor = 3
        negentropy = 2
    }

    negentropy {
        enabled = true
        maxSyncEvents = 1000000
    }

    filterValidation {
        enabled = false
        maxFiltersPerReq = 3
        minFiltersPerReq = 1
        maxKindsPerFilter = 3
        allowedKinds = ""
        requireAuthorOrTag = false
    }
}
